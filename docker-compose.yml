services:

  mcp_server:
    build:
      context: ./mcp_server
      dockerfile: Dockerfile

    ports:
      - "8000:8000"

    volumes:
      - ./data:/app/data

    env_file:
      - .env

    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s